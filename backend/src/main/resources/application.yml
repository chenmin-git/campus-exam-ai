server:
  port: 8080

spring:
  application:
    name: campus-exam-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_exam_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  auth:
    token-hours: ${TOKEN_HOURS:12}

spark:
  api-url: ${SPARK_API_URL:https://spark-api-open.xf-yun.com/v1/chat/completions}
  api-password: ${SPARK_API_PASSWORD:}
  model: ${SPARK_MODEL:generalv3}
